name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore CoreFX.slnx

      - name: Build
        run: dotnet build CoreFX.slnx --no-restore -c Release

      - name: Test
        run: dotnet test CoreFX.slnx --no-build -c Release

      - name: Pack
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet pack CoreFX.slnx --no-build -c Release -o ./nupkgs

      - name: Push to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push ./nupkgs/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
